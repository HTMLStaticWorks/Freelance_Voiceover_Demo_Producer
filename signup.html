<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VoiceFlow Studios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <style>
        .auth-top-controls {
            position: fixed;
            top: 1rem;
            inset-inline-end: 1rem;
            z-index: 1100;
        }

        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 2rem;
            padding-bottom: 4rem;
        }

        .auth-card {
            background: var(--secondary-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
        }

        .form-control,
        .form-control:focus {
            background: transparent;
            color: var(--text-main);
            border-color: var(--glass-border);
            box-shadow: none;
        }

        [data-theme="dark"] .auth-card .form-control {
            color: #f8fbff;
        }

        [data-theme="dark"] .auth-card .form-control::placeholder {
            color: rgba(248, 251, 255, 0.55);
        }

        .social-auth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.2rem 0 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .social-auth-divider::before,
        .social-auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .social-auth-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: transparent;
            color: var(--text-main);
            padding: 0.6rem 1rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .social-auth-btn:hover {
            background: var(--glass-bg);
            color: var(--text-main);
        }

        .auth-card a.text-info {
            transition: var(--transition-smooth);
        }

        .auth-card a.text-info:hover,
        .auth-card a.text-info:focus-visible {
            color: var(--accent-purple) !important;
            text-decoration: underline !important;
        }
    </style>
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-top-controls d-flex align-items-center gap-2">
        <button onclick="toggleTheme()" class="btn btn-dark rounded-circle btn-sm">
            <i class="bi bi-moon-stars"></i>
        </button>
        <button onclick="toggleDirection()" class="btn btn-dark rounded-circle btn-sm">
            <i class="bi bi-arrow-left-right"></i>
        </button>
    </div>

    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-9">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <a class="brand-logo text-decoration-none" href="index.html"><span
                                    class="brand-logo-mark"><i class="bi bi-soundwave"></i></span><span
                                    class="brand-logo-text">VOICEFLOW</span></a>
                        </div>
                        <h1 class="h2 mb-2 text-center">Create Your Account</h1>
                        <p class="text-muted mb-4 text-center">Set up your VoiceFlow profile and start your first
                            production.</p>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="First name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Last name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="you@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="password-field-wrapper">
                                    <input type="password" class="form-control" id="passwordInput"
                                        placeholder="Create password">
                                    <i class="bi bi-eye password-toggle-icon" id="passwordToggle"></i>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="password-field-wrapper">
                                    <input type="password" class="form-control" id="confirmPasswordInput"
                                        placeholder="Repeat password">
                                    <i class="bi bi-eye password-toggle-icon" id="confirmPasswordToggle"></i>
                                </div>
                            </div>
                            <div class="form-check mt-4 mb-4">
                                <input class="form-check-input" type="checkbox" id="agreeTerms">
                                <label class="form-check-label" for="agreeTerms">I agree to the <a href="#"
                                        class="text-info text-decoration-none">Terms and Privacy Policy</a></label>
                            </div>
                            <button type="submit" class="btn btn-primary-glow btn-premium w-100">Create Account</button>

                            <div class="social-auth-divider">or continue with</div>
                            <div class="d-grid gap-2">
                                <button type="button" class="social-auth-btn"><i class="bi bi-google"></i>
                                    Google</button>
                                <button type="button" class="social-auth-btn"><i class="bi bi-facebook"></i>
                                    Facebook</button>
                                <button type="button" class="social-auth-btn"><i class="bi bi-apple"></i> Apple</button>
                            </div>
                        </form>

                        <p class="text-muted mt-4 mb-0 text-center">Already have an account? <a href="login.html"
                                class="text-info text-decoration-none">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        function setupPasswordToggle(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);

            if (toggle && input) {
                toggle.addEventListener('click', function () {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('bi-eye');
                    this.classList.toggle('bi-eye-slash');
                });
            }
        }

        setupPasswordToggle('passwordInput', 'passwordToggle');
        setupPasswordToggle('confirmPasswordInput', 'confirmPasswordToggle');
    </script>
</body>

</html>
