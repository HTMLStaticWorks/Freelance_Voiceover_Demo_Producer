<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | VoiceFlow Studios</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">

    <style>
        .profile-hero {
            background: linear-gradient(135deg, rgba(58, 190, 255, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 30px;
            padding: 3rem;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .profile-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent-blue);
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="../index.html" class="sidebar-logo text-decoration-none">VOICEFLOW</a>
            <ul class="sidebar-nav">
                <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i>
                        Dashboard</a></li>
                <li class="sidebar-item"><a href="my-projects.html" class="sidebar-link"><i
                            class="bi bi-folder2-open"></i> My Projects</a></li>
                <li class="sidebar-item"><a href="audio-reviews.html" class="sidebar-link"><i
                            class="bi bi-cassette"></i> Audio Reviews</a></li>
                <li class="sidebar-item"><a href="downloads.html" class="sidebar-link"><i class="bi bi-download"></i>
                        Downloads</a></li>
                <li class="sidebar-item"><a href="messages.html" class="sidebar-link"><i class="bi bi-chat-dots"></i>
                        Messages</a></li>
                <li class="sidebar-divider py-3">
                    <hr class="border-secondary opacity-25">
                </li>
                <li class="sidebar-item"><a href="billing.html" class="sidebar-link"><i class="bi bi-credit-card"></i>
                        Billing</a></li>
                <li class="sidebar-item"><a href="settings.html" class="sidebar-link active"><i class="bi bi-gear"></i>
                        Settings</a></li>
                <li class="sidebar-item"><a href="../login.html" class="sidebar-link"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="mb-5 d-flex justify-content-between align-items-center">
                <h2 class="mb-0">Talent Profile</h2>
                <button class="btn btn-premium btn-primary-glow btn-sm">Save Changes</button>
            </header>

            <div class="profile-hero">
                <div class="position-relative">
                    <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200&h=200&fit=crop"
                        alt="User" class="profile-avatar-large">
                    <button class="btn btn-dark btn-sm rounded-circle position-absolute bottom-0 end-0 m-1"><i
                            class="bi bi-camera"></i></button>
                </div>
                <div>
                    <h3 class="mb-1">Alex Thorne</h3>
                    <p class="text-info mb-3">Elite Tier • Commercial & Gaming Specialty</p>
                    <div class="d-flex gap-2">
                        <span class="badge bg-secondary">American English</span>
                        <span class="badge bg-secondary">Baritone / Tenor</span>
                        <span class="badge bg-secondary">Mid-20s to 40s</span>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="studio-card">
                        <h5 class="mb-4">Profile Details</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">First Name</label>
                                <input type="text" class="form-control bg-dark border-secondary text-white"
                                    value="Alex">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Last Name</label>
                                <input type="text" class="form-control bg-dark border-secondary text-white"
                                    value="Thorne">
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Professional Bio</label>
                                <textarea class="form-control bg-dark border-secondary text-white"
                                    rows="4">Professional voice actor with a focus on cinematic storytelling and high-impact commercial spots. Specializing in dry builds and immersive game performances.</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="studio-card">
                        <h5 class="mb-4">Studio Setup</h5>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Microphone</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                value="Neumann TLM 103">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Interface</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                value="Universal Audio Apollo Twin">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Software</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white"
                                value="Adobe Audition / Pro Tools">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
